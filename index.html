
<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FastPay Network | القوة المالية العالمية</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Vazirmatn:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
    <script>
      const currentBuildId = '__APP_BUILD_ID__'; // Injected by Vite
      const storedBuildId = localStorage.getItem('app_build_id');

      if (storedBuildId && storedBuildId !== currentBuildId) {
        console.log('New app version detected. Reloading...');
        localStorage.setItem('app_build_id', currentBuildId);
        window.location.reload(true);
      } else if (!storedBuildId) {
        localStorage.setItem('app_build_id', currentBuildId);
      }
    </script>
</body>
</html>
